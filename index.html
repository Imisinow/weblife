<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnireVibes | Pixel Pulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #gameCanvas {
            background: #1a1a1a;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            touch-action: none; /* Prevents scrolling while playing on mobile */
        }
    </style>
</head>
<body class="bg-dark text-light">

<div class="container py-5 text-center">
    <h1 class="display-4 fw-bold mb-3">PIXEL PULSE</h1>
    
    <div class="card bg-secondary border-0 shadow-lg">
        <div class="card-body">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div class="mt-3">
                <h3>Score: <span id="score">0</span></h3>
                <button id="startBtn" class="btn btn-warning btn-lg px-5">START GAME</button>
            </div>
        </div>
    </div>

    <div class="mt-5 col-md-6 mx-auto">
        <h4>Global Leaderboard</h4>
        <ul id="leaderboard" class="list-group list-group-flush bg-transparent">
            </ul>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="game.js"></script>
</body>
</html>
